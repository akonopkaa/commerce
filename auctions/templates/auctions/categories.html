{% extends "auctions/layout.html" %}

{% block body %}
<h2>
    Categories
</h2>
{% for category in categories %}
<div>
    <div>
        <a href="{% url 'view_category' category.id %}">
            {{ category.category }}
        </a>
    </div>
</div>
{% empty %}
<div>
    No categories available
</div>
{% endfor %}
{% endblock %}
