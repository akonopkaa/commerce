{% extends "auctions/layout.html" %}

{% block body %}
<h2 class="text-center">
    Create listing
</h2>
<div class="form-group w-50 mx-auto">
    <form action="{% url 'create_listing' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form }}
        <input class="btn btn-primary" type="submit">
    </form>
</div>
{% endblock %}
